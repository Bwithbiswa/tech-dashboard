name: Auto-Update Events (Weekly)

on:
  schedule:
    - cron: '30 0 * * 1'   # Every Monday at 6:00 AM IST (00:30 UTC)
  workflow_dispatch:         # Allow manual trigger from GitHub Actions tab

jobs:
  update-events:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch events and update dashboard
        run: python scripts/fetch_events.py

      - name: Commit updated events
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "Auto-update events [$(date '+%d %b %Y')]"
          git push
